<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper & Scissors Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 600px;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #e0dddd;
        }

        .game-box {
            width: 400px;
            height: 400px;
            border: 3px solid #333;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            background: rgb(247, 158, 170);
            box-shadow: 0px 4px 10px 12px;
        }

        .buttons button {
            width: 90px;
            height: 90px;
            font-size: 17px;
            font-weight: bold;
            padding: 10px;
            align-items: center;
            margin: 12px;
            background-color: lightcoral;
            border-radius: 8px;
            cursor: pointer;
        }

        .buttons button:hover {
            background-color: lightgreen;
        }

        .result{
            font-weight: bold;
            margin-top: 20px;
        }

        .score{
            font-weight: bold;
            margin-top: 30px;
        }

        .play-again {
            width: 100px;
            height: 40px;
            font-size: 14px;
            font-weight: bold;
            padding: 4px;
            align-items: center;
            background-color: rgb(162, 236, 236);
            border-radius: 5px;
            cursor: pointer;
            margin-top: 30px;
        }

        .play-again:hover {
            background-color: rgb(147, 179, 190);
        }
    </style>
</head>

<body>
    <div class="game-box">
        <h2>Rock, Paper & Scissors Game</h2>
        <div class="buttons">
            <button onclick="play('Rock')">Rock</button>
            <button onclick="play('Paper')">Paper</button>
            <button onclick="play('Scissors')">Scissors</button>
        </div>

        <div class="result">
            <p>Make your choice above!</p>
        </div>

        <div class="score">
            You: <span id="userScore">0</span>
            Computer: <span id="compScore">0</span>
            <!-- <p>User Score: 0 | Computer Score: 0</p> -->
        </div>

        <button class="play-again" onclick="restart()">Play Again</button>
    </div>

    <script>
        var userScore = 0;
        var compScore = 0;

        function play(userInput) {
            var user = ["Rock", "Paper", "Scissors"];
            // var user = prompt("Let's Start The Game\n Press 1 For Rock\n Press 2 For Paper\n Press 3 For Scissors\n ");
            // var userInput;
            // if (user == 1) {
            //     userInput = "Rock";
            // }
            // else if (user == 2) {
            //     userInput = "Paper";
            // }
            // else {
            //     userInput = "Scissors";
            // }

            var computerInput = user[Math.floor(Math.random() * 3)];

            // if (randomNumber == 1) {
            //     computerInput = "Rock";
            // }
            // else if (randomNumber == 2) {
            //     computerInput = "Paper";
            // }
            // else {
            //     computerInput = "Scissors";
            // }


            var resultText = "";
            if (userInput == computerInput) {
                resultText = "<p style='color:gray;'><b>Result : It's a Tie!</b></p>";
                // document.write("<p>Result: It's a Tie!</p>");
            } else if ((userInput == "Rock" && computerInput == "Scissors") ||
                // document.write("<p>Result: You Win!</p>");
                (userInput == "Paper" && computerInput == "Rock") ||
                // document.write("<p>Result: You Win!</p>");
                (userInput == "Scissors" && computerInput == "Paper")) {
                resultText = "<p style='color:green;'>Result : You Win!</p>";
                userScore++;
                // document.querySelector(".score").innerHTML = "<p>User Score: " + userScore + " | Computer Score: " + computerScore + "</p>";
            } else {
                resultText = "<p style='color:red;'>Result : Computer Wins!</p>";
                compScore++;
                // document.querySelector(".score").innerHTML = "<p>User Score: " + userScore + " | Computer Score: " + computerScore + "</p>";
            }

            document.querySelector(".result").innerHTML = "<p>You Selected: <b>" + userInput + "</b></p>" +
                "<p>Computer Selected: <b>" + computerInput + "</b></p>" +
                resultText;

            document.getElementById("userScore").textContent = userScore;
            document.getElementById("compScore").textContent = compScore;
        }

        function restart() {
            userScore = 0;
            compScore = 0;
            // document.querySelector(".score").innerHTML = "<p>User Score: 0 | Computer Score: 0</p>";
            document.querySelector(".result").innerHTML = "<p>Make your choice above!</p>";
            document.getElementById("userSore").textContent = userScore;
            document.getElementById("compScore").textContent = compScore;
        }
    </script>
</body>

</html>
